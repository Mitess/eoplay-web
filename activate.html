<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Activar tu televisor — EO Play</title>
<style>
  :root{
    --bg:#0E1016; --surface:#171A24; --surface2:#1B1F2A;
    --text:#FFFFFF; --muted:#9AA0AE; --accent:#8B8DF1; --err:#FF5252; --ok:#3DDC84;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .card{width:100%; max-width:380px; background:var(--surface); border-radius:16px; padding:26px 22px;}
  .brand{display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px}
  .logo{width:40px;height:40px;border-radius:9px;background:var(--surface2);
    display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:13px;line-height:1}
  h1{font-size:19px; text-align:center; margin:14px 0 2px}
  p.sub{color:var(--muted); text-align:center; font-size:13px; margin:0 0 20px}
  label{display:block; font-size:12px; color:var(--muted); margin:14px 0 6px}
  input{width:100%; background:var(--surface2); border:1px solid #2a2f3d; color:var(--text);
    border-radius:10px; padding:13px 14px; font-size:16px; outline:none}
  input:focus{border-color:var(--accent)}
  #code{text-align:center; letter-spacing:8px; font-size:24px; font-weight:700}
  button{width:100%; margin-top:20px; background:var(--accent); color:#0b0c12; border:none;
    border-radius:10px; padding:14px; font-size:16px; font-weight:700; cursor:pointer}
  button:disabled{opacity:.6; cursor:default}
  .msg{margin-top:14px; font-size:13px; text-align:center; min-height:18px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--ok)}
  .done{text-align:center}
  .done .big{font-size:40px} .done h2{margin:10px 0 4px;font-size:20px}
  .foot{margin-top:18px; text-align:center; font-size:11px; color:#5b6270; line-height:1.5}
  .hidden{display:none}
</style>
</head>
<body>
  <div class="card">
    <div id="form-view">
      <div class="brand"><div class="logo">EO</div></div>
      <h1>Activa tu televisor</h1>
      <p class="sub">Inicia sesión y confirma el código que aparece en la TV.</p>

      <label for="email">Correo</label>
      <input id="email" type="email" autocomplete="username" inputmode="email" placeholder="tu@correo.com" />

      <label for="password">Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />

      <label for="code">Código de la TV</label>
      <input id="code" type="text" inputmode="numeric" maxlength="6" placeholder="••••••" />

      <button id="go">Activar TV</button>
      <div id="msg" class="msg"></div>
    </div>

    <div id="done-view" class="done hidden">
      <div class="big">✅</div>
      <h2>¡Televisor activado!</h2>
      <p class="sub">Tu TV entrará sola en unos segundos. Ya puedes cerrar esta página.</p>
    </div>

    <div class="foot">EO Play — reproductor multimedia. El contenido lo añade el propio usuario.</div>
  </div>

<script>
(function(){
  var SB_URL = 'https://pkdjoyhwtepwkbaukkah.supabase.co';
  var SB_KEY = 'sb_publishable_vY46lnEDkmhWfbfQ0Kn77A_QVqTqYl1';

  var $ = function(id){ return document.getElementById(id); };
  var msg = $('msg');

  // Código prerrellenado desde el QR (?code=123456 o #code=123456)
  function paramCode(){
    var m = (location.search + ' ' + location.hash).match(/code=(\d{4,8})/);
    return m ? m[1] : '';
  }
  var pc = paramCode();
  if (pc) $('code').value = pc;

  function setMsg(t, cls){ msg.textContent = t || ''; msg.className = 'msg' + (cls ? ' ' + cls : ''); }

  function api(path, opts){
    opts = opts || {};
    var h = { 'apikey': SB_KEY, 'Content-Type': 'application/json' };
    if (opts.token) h['Authorization'] = 'Bearer ' + opts.token;
    return fetch(SB_URL + path, {
      method: opts.method || 'POST',
      headers: h,
      body: opts.body ? JSON.stringify(opts.body) : undefined
    }).then(function(r){
      return r.text().then(function(t){
        var data; try { data = t ? JSON.parse(t) : null; } catch(e){ data = t; }
        return { ok: r.ok, status: r.status, data: data };
      });
    });
  }

  function activate(){
    var email = $('email').value.trim();
    var pass = $('password').value;
    var code = ($('code').value || '').replace(/\D/g, '');
    if (!email || !pass) { setMsg('Escribe tu correo y contraseña.', 'err'); return; }
    if (code.length !== 6) { setMsg('El código son 6 dígitos.', 'err'); return; }

    $('go').disabled = true; setMsg('Iniciando sesión…');

    // 1) Login (password grant)
    api('/auth/v1/token?grant_type=password', { body: { email: email, password: pass } })
      .then(function(res){
        if (!res.ok || !res.data || !res.data.access_token) {
          throw new Error(res.data && res.data.error_description ? res.data.error_description : 'Correo o contraseña incorrectos.');
        }
        setMsg('Activando el televisor…');
        // 2) Reclamar el código (igual que la app móvil)
        return api('/rest/v1/rpc/claim_pairing', {
          token: res.data.access_token,
          body: { p_code: code, p_token: res.data.refresh_token }
        });
      })
      .then(function(res){
        if (res.ok && res.data === true) {
          $('form-view').classList.add('hidden');
          $('done-view').classList.remove('hidden');
        } else {
          throw new Error('Código no válido o caducado. Genera uno nuevo en la TV.');
        }
      })
      .catch(function(e){
        $('go').disabled = false;
        setMsg(e.message || 'Algo salió mal. Inténtalo de nuevo.', 'err');
      });
  }

  $('go').addEventListener('click', activate);
  $('password').addEventListener('keydown', function(e){ if (e.key === 'Enter') activate(); });
  $('code').addEventListener('keydown', function(e){ if (e.key === 'Enter') activate(); });
})();
</script>
</body>
</html>
